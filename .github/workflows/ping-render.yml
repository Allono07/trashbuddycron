name: Ping Render Health Endpoint

on:
  schedule:
    # 00:30, 00:40, ..., 05:50 UTC
    # Corresponds to 06:00–11:20 IST
    - cron: '30,40,50 0 * * *'
    - cron: '*/10 1-5 * * *'

    # 06:00, 06:10, 06:20, 06:30 UTC
    # Corresponds to 11:30, 11:40, 11:50, 12:00 IST
    - cron: '0,10,20,30 6 * * *'

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Call health endpoint
        run: |
          curl -f https://waste-tracker-backend-city.onrender.com/health